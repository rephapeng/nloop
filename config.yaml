# nloop config — semua nilai punya default di engine/config.py
server:
  host: 0.0.0.0     # akses via tailscale; dashboard BELUM ada auth — jangan expose ke internet publik
  port: 8484

loops:
  max_concurrent: 2        # semaphore: tiap loop = pohon subprocess claude
  max_iterations: 10
  max_cost_usd: 5.0
  iteration_timeout_sec: 900
  poll_interval_sec: 1.0   # worker polling queue
  max_no_progress: 2       # verifier output identik N kali beruntun -> stop (anti muter-muter)
  budget_warn_ratio: 0.8   # event warning saat cost nyentuh 80% budget

claude:
  model: null              # null = default model CLI (subscription)
  max_turns: 30
  allowed_tools: "Bash,Read,Edit,Write,Glob,Grep"
  permission_mode: acceptEdits
  retries: 1                  # retry dalam-iterasi buat error transient
  max_consecutive_errors: 2   # iterasi error beruntun -> fail run

memory:
  provider: local          # local | selfmem  (Fase 7)

paths:
  db: nloop.db
  workspaces: workspaces
