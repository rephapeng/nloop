# nloop config — semua nilai punya default di engine/config.py
server:
  host: 0.0.0.0     # akses via tailscale; dashboard BELUM ada auth — jangan expose ke internet publik
  port: 8484

loops:
  max_concurrent: 2        # semaphore: tiap loop = pohon subprocess claude
  max_iterations: 10
  max_cost_usd: 5.0
  iteration_timeout_sec: 900
  poll_interval_sec: 1.0   # worker polling queue
  max_no_progress: 2       # verifier output identik N kali beruntun -> stop (anti muter-muter)
  budget_warn_ratio: 0.8   # event warning saat cost nyentuh 80% budget

claude:
  model: null              # null = default model CLI (subscription)
  max_turns: 50
  allowed_tools: "Bash,Read,Edit,Write,Glob,Grep"
  permission_mode: acceptEdits
  retries: 1                  # retry dalam-iterasi buat error transient
  max_consecutive_errors: 2   # iterasi error beruntun -> fail run
  lock_file: null             # single-flight LINTAS proses (flock). Share subscription
                              # dengan agent lain di box? samain file-nya, mis.
                              # /opt/dtc-agent/.claude.lock
  gate_max_turns: 15          # LLM quality gate (reviewer read-only)
  gate_allowed_tools: "Read,Grep,Glob"

# Reactive triggers: webhook Sentry/PostHog -> loop otomatis.
# URL: POST /api/hooks/{sentry|posthog|generic}?project=<nama>&token=<token>
triggers:
  token: null              # WAJIB diisi string random kalau server-nya exposed
  sentry:
    resolve: true          # run sukses -> mark issue resolved (SENTRY_AUTH_TOKEN di .env)
    url: https://sentry.io
  projects:
    marginin:              # issue Sentry masuk -> repro -> fix -> push+deploy -> resolve
      workdir: /opt/marginin
      verify_cmd: "npm run build"     # health check project (repro script otomatis di depannya)
      repro: true                     # agent WAJIB tulis .nloop/repro/<issue>.sh dulu
      on_success_cmd: >-
        git add -A && git commit -m "fix: auto-fix Sentry issue (nloop)" &&
        git push origin main && docker compose up -d --build
      max_iterations: 8
      max_cost_usd: 5.0
    onecookie:             # toko kue — FastAPI + vanilla JS (lihat /opt/onecookie/CLAUDE.md)
      workdir: /opt/onecookie
      verify_cmd: "python3 -m py_compile app/main.py app/db.py && node --check public/js/store.js && node --check public/admin/admin.js"
      repro: true
      on_success_cmd: >-
        git add -A && git commit -m "fix: auto-fix Sentry issue (nloop)" &&
        git push origin main && docker compose up -d --build
      max_iterations: 8
      max_cost_usd: 5.0

# Watchdog Sentry: poll issue unresolved tiap interval -> spawn loop issue-fix.
# Pelengkap webhook — issue tetap ketangkep walau alert rule lupa dipasang.
# Isi organization (slug org Sentry) + SENTRY_AUTH_TOKEN di .env, lalu enable.
watchdog:
  enabled: true
  interval: 1h             # default kalau project di bawah nggak override
  cooldown: 24h            # issue yang barusan dicoba (sukses/gagal) jangan diulang dulu
  max_per_tick: 1
  organization: marginin
  projects:                # tiap project poll SENDIRI-SENDIRI, interval bisa beda
    marginin:
      name: marginin        # <nama di triggers.projects>
      interval: 30m         # TODO: sesuaikan — placeholder, ganti sesuai kebutuhan
    onecookie:
      name: onecookie
      interval: 2h          # TODO: sesuaikan — placeholder, ganti sesuai kebutuhan

memory:
  provider: local          # local | selfmem  (Fase 8)

# Loop terjadwal (port systemd-timer + pipeline dtc-agent). `at` = harian UTC,
# atau `every` = interval (30m/6h/1d). Steps jalan BERURUTAN; step berikut cuma
# jalan kalau sebelumnya succeeded, kecuali `always: true`.
#
# promo-pagi/sore: gimmick post MarginIn -> Buffer (twitter + threads), terbit di
# primetime WIB (pagi 07:30, sore 19:00 — jam post diatur scripts/buffer_post.py).
# Run nyala ~45 menit sebelum jam post biar agent sempet nulis. Token Buffer di
# .env (BUFFER_ACCESS_TOKEN).
schedules:
  promo-pagi:
    at: "23:45"            # UTC = 06:45 WIB -> post terbit 07:30 WIB
    steps:
      - goal: >-
          Bikin gimmick post promosi MarginIn buat slot PAGI: 1 post twitter +
          1 post threads, jadwalin ke Buffer pake
          /opt/nloop/.venv/bin/python3 /opt/nloop/scripts/buffer_post.py post
          --slot pagi. Ikuti aturan konten di role.
        workdir: /opt/nloop
        verify_cmd: ".venv/bin/python3 scripts/buffer_post.py verify --slot pagi"
        role: buffer-promo
        context_cmd: ".venv/bin/python3 scripts/buffer_post.py recent -n 10"
        max_iterations: 4
        max_cost_usd: 1.5
  promo-sore:
    at: "11:15"            # UTC = 18:15 WIB -> post terbit 19:00 WIB
    steps:
      - goal: >-
          Bikin gimmick post promosi MarginIn buat slot SORE: 1 post twitter +
          1 post threads, jadwalin ke Buffer pake
          /opt/nloop/.venv/bin/python3 /opt/nloop/scripts/buffer_post.py post
          --slot sore. Ikuti aturan konten di role.
        workdir: /opt/nloop
        verify_cmd: ".venv/bin/python3 scripts/buffer_post.py verify --slot sore"
        role: buffer-promo
        context_cmd: ".venv/bin/python3 scripts/buffer_post.py recent -n 10"
        max_iterations: 4
        max_cost_usd: 1.5
