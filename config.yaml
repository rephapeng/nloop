# Bot Telegram: notif run selesai + kontrol (/loops /new /stop) + chat agent.
# Secrets di .env (chmod 600, gitignored): TELEGRAM_BOT_TOKEN, TELEGRAM_ALLOWED_CHAT_IDS
telegram:
  enabled: true
  notify: true             # broadcast run selesai ke semua chat allow-list
  agent_workdir: .         # cwd buat chat freeform -> session Claude Code
  model: null              # model chat substantif (null = default CLI)
  model_smalltalk: sonnet  # sapaan pendek -> tier murah (hemat subscription)
  thinking_tokens: 10000
  cmd_timeout_sec: 900
  max_turns: null          # null = tanpa batas turn buat chat (guardrail: timeout + auto-continue)
  progress_interval_sec: 60  # kirim update progres ke chat tiap N detik (0 = off)
  # role: agent            # roles/agent.md dipake sebagai persona chat
  # context_cmd: "..."     # grounding segar buat tiap pesan chat

paths:
  db: nloop.db
  workspaces: workspaces
  roles: roles             # roles/<nama>.md + roles/common.md (system prompt)
