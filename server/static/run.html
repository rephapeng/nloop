<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>nloop — run</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔁</text></svg>">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body data-page="run">

  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/">
        <span class="logo">∞</span> nloop
      </a>
      <span class="crumb">/ <code id="run-id"></code></span>
      <span class="spacer"></span>
      <span id="status-badge"></span>
    </div>
  </header>

  <main class="wrap">

    <section class="card run-head">
      <div class="top">
        <p class="goal-big" id="goal">…</p>
        <button id="stop" class="danger" style="display:none">Stop</button>
      </div>
      <div class="chips" id="chips"></div>
      <div class="gauges">
        <div class="gauge">
          <div class="lbl"><span>Iterations</span><b id="iter">–</b></div>
          <div class="bar" id="iter-bar"><i style="width:0%"></i></div>
        </div>
        <div class="gauge">
          <div class="lbl"><span>Budget</span><b id="cost">–</b></div>
          <div class="bar" id="cost-bar"><i style="width:0%"></i></div>
        </div>
      </div>
    </section>

    <h2 class="sect">Live</h2>
    <div id="live" class="card"></div>

    <h2 class="sect">Iteration timeline</h2>
    <div id="iterations"><div class="empty">no iterations yet</div></div>

  </main>

  <script src="/static/app.js"></script>
</body>
</html>
